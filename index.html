<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Budget Planner - Quản lý chi tiêu cá nhân</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="container">

            <h1>💰 Budget Planner</h1>

            <p>

                Quản lý chi tiêu thông minh theo độ tuổi, giới tính, nghề nghiệp và thu nhập

            </p>

        </div>

    </header>

    <!-- MAIN -->

    <main class="container">

        <!-- THÔNG TIN -->

        <section class="card">

            <h2>Thông tin cá nhân</h2>

            <!-- Độ tuổi -->

            <div class="form-group">

                <label>Độ tuổi</label>

                <select id="ageGroup">

                    <option value="">-- Chọn độ tuổi --</option>

                    <option value="11-17">11 - 17 tuổi</option>

                    <option value="18-22">18 - 22 tuổi</option>

                    <option value="23-35">23 - 35 tuổi</option>

                    <option value="36-55">36 - 55 tuổi</option>

                    <option value="56+">56 tuổi trở lên</option>

                </select>

            </div>

            <!-- Giới tính -->

            <div class="form-group">

                <label>Giới tính</label>

                <select id="gender">

                    <option value="">-- Chọn giới tính --</option>

                    <option value="male">Nam</option>

                    <option value="female">Nữ</option>

                </select>

            </div>

            <!-- Nghề nghiệp -->

            <div class="form-group">

                <label>Nghề nghiệp</label>

                <select id="job">

                    <option value="">-- Chọn nghề nghiệp --</option>

                    <option value="student">Học sinh</option>

                    <option value="university">Sinh viên</option>

                    <option value="worker">Người đi làm</option>

                    <option value="freelancer">Lao động tự do</option>

                    <option value="retired">Người nghỉ hưu</option>

                </select>

            </div>

            <!-- Hiển thị động -->

            <div id="dynamicFields"></div>

            <!-- Thu nhập -->

            <div class="form-group">

                <label>

                    Thu nhập / Ngân sách mỗi tháng (VNĐ)

                </label>

                <input

                    type="number"

                    id="budget"

                    placeholder="Ví dụ: 5000000"

                >

            </div>

            <!-- Sở thích -->

            <div class="form-group">

                <label>

                    Sở thích (Có thể chọn nhiều)

                </label>

                <div id="hobbyContainer">

                </div>

            </div>

            <button id="generateBtn">

                📊 Tạo kế hoạch chi tiêu

            </button>

        </section>

        <!-- KẾT QUẢ -->

        <section id="resultSection">

            <div class="welcome">

                <h2>

                    👋 Chào mừng!

                </h2>

                <p>

                    Hãy nhập đầy đủ thông tin để hệ thống đề xuất kế hoạch chi tiêu phù hợp với hoàn cảnh của bạn.

                </p>

            </div>

        </section>

        <!-- BIỂU ĐỒ -->

        <section class="chart-section">

            <canvas id="budgetChart"></canvas>

        </section>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>

            © 2026 Budget Planner | Developed by Phan Thùy Linh

        </p>

    </footer>

    <!-- DATA -->

    <script src="data.js"></script>

    <!-- SCRIPT -->

    <script src="script.js"></script>

</body>

</html>
